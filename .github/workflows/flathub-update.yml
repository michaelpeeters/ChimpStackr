name: Update Flathub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  update-flathub:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate offline pip sources
        run: |
          pip install req2flatpak pip-tools

          # Create a temporary requirements file
          cat > /tmp/requirements.in << 'EOF'
          opencv-python-headless
          numpy
          numba
          rawpy
          imageio
          scipy
          pyfftw
          EOF

          # Compile exact versions
          pip-compile /tmp/requirements.in -o /tmp/requirements.txt --strip-extras -q

          # Generate flatpak sources (prefers binary wheels, works with all packages)
          req2flatpak --requirements-file /tmp/requirements.txt \
            --target-platforms 3.12-x86_64 \
            --outfile packaging/flatpak/python-deps.json

          echo "Generated $(wc -l < packaging/flatpak/python-deps.json) lines of pip sources"
          echo "=== Packages included ==="
          cat /tmp/requirements.txt

      - name: Generate Flathub manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Get the commit SHA for this tag
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)

          cat > packaging/flatpak/flathub/io.github.noah_peeters.ChimpStackr.yml << MANIFEST
          app-id: io.github.noah_peeters.ChimpStackr
          runtime: org.kde.Platform
          runtime-version: '6.9'
          sdk: org.kde.Sdk
          base: io.qt.PySide.BaseApp
          base-version: '6.9'
          command: chimpstackr

          finish-args:
            - --share=ipc
            - --socket=fallback-x11
            - --socket=wayland
            - --device=dri
            - --filesystem=home

          cleanup-commands:
            - /app/cleanup-BaseApp.sh

          cleanup:
            - /include
            - /lib/pkgconfig
            - /lib/cmake
            - /share/man
            - '*.a'
            - '*.la'

          modules:
            # FFTW3 single-precision (required by pyFFTW)
            - name: fftw3-float
              buildsystem: autotools
              config-opts:
                - --enable-shared
                - --disable-static
                - --enable-threads
                - --enable-float
              sources:
                - type: archive
                  url: https://www.fftw.org/fftw-3.3.10.tar.gz
                  sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467

            # FFTW3 double-precision
            - name: fftw3-double
              buildsystem: autotools
              config-opts:
                - --enable-shared
                - --disable-static
                - --enable-threads
              sources:
                - type: archive
                  url: https://www.fftw.org/fftw-3.3.10.tar.gz
                  sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467

            # LibRaw (required by rawpy)
            - name: libraw
              buildsystem: autotools
              config-opts:
                - --disable-static
                - --enable-shared
              sources:
                - type: archive
                  url: https://www.libraw.org/data/LibRaw-0.21.3.tar.gz
                  sha256: dba34b7fc1143503942fa32ad9db43e94f714e62a4a856e91617f8f3e1e0aa5c

            # Python dependencies (generated by req2flatpak)
            - python-deps.json

            # ChimpStackr application
            - name: chimpstackr
              buildsystem: simple
              build-commands:
                - |
                  PYVER=\$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
                  SITE="/app/lib/python\${PYVER}/site-packages"
                  mkdir -p "\${SITE}/src"
                  cp -r src/* "\${SITE}/src/"
                  mkdir -p "\${SITE}/packaging"
                  cp -r packaging/icons "\${SITE}/packaging/"
                - |
                  PYVER=\$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
                  mkdir -p /app/bin
                  cat > /app/bin/chimpstackr << EOF
                  #!/usr/bin/env python3
                  import sys
                  sys.path.insert(0, "/app/lib/python\${PYVER}/site-packages")
                  from src.run import main
                  main()
                  EOF
                  chmod +x /app/bin/chimpstackr
                - |
                  PYVER=\$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
                  cat > /app/bin/chimpstackr-cli << EOF
                  #!/usr/bin/env python3
                  import sys
                  sys.path.insert(0, "/app/lib/python\${PYVER}/site-packages")
                  from src.cli import main
                  main()
                  EOF
                  chmod +x /app/bin/chimpstackr-cli
                - install -Dm644 packaging/flatpak/io.github.noah_peeters.ChimpStackr.desktop
                    /app/share/applications/io.github.noah_peeters.ChimpStackr.desktop
                - install -Dm644 packaging/flatpak/io.github.noah_peeters.ChimpStackr.metainfo.xml
                    /app/share/metainfo/io.github.noah_peeters.ChimpStackr.metainfo.xml
                - install -Dm644 packaging/icons/icon_128x128.png
                    /app/share/icons/hicolor/128x128/apps/io.github.noah_peeters.ChimpStackr.png
                - install -Dm644 packaging/icons/icon_256x256.png
                    /app/share/icons/hicolor/256x256/apps/io.github.noah_peeters.ChimpStackr.png
                - install -Dm644 packaging/icons/icon_512x512.png
                    /app/share/icons/hicolor/512x512/apps/io.github.noah_peeters.ChimpStackr.png
              sources:
                - type: git
                  url: https://github.com/noah-peeters/ChimpStackr.git
                  tag: ${TAG}
                  commit: ${COMMIT}
                  x-checker-data:
                    type: git
                    tag-pattern: ^v([\\d.]+)\$
          MANIFEST

      - name: Copy shared files for Flathub
        run: |
          mkdir -p packaging/flatpak/flathub
          cp packaging/flatpak/python-deps.json packaging/flatpak/flathub/
          cp packaging/flatpak/io.github.noah_peeters.ChimpStackr.desktop packaging/flatpak/flathub/
          cp packaging/flatpak/io.github.noah_peeters.ChimpStackr.metainfo.xml packaging/flatpak/flathub/

          # Create flathub.json for auto-merge
          cat > packaging/flatpak/flathub/flathub.json << 'EOF'
          {
            "automerge-flathubbot-prs": true,
            "require-important-update": false
          }
          EOF

          echo "=== Flathub directory contents ==="
          ls -la packaging/flatpak/flathub/

      - name: Commit Flathub files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B flathub
          git add packaging/flatpak/python-deps.json packaging/flatpak/flathub/
          git commit -m "Update Flathub manifest for ${{ steps.version.outputs.tag }}" || echo "No changes"
          git push origin flathub --force
